services:
  postgres:
    image: postgres:16-alpine
    container_name: canquest-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: canquest
      POSTGRES_PASSWORD: canquest_dev
      POSTGRES_DB: canquest_app
    volumes:
      - canquest_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: canquest-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - canquest_redis_data:/data
    command: redis-server --appendonly yes

volumes:
  canquest_pg_data:
  canquest_redis_data:
