# Local dev infrastructure only — PostgreSQL + Redis
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down
#
# This does NOT run the app (Next.js / NestJS) — run those with npm as usual.
# Connection strings match the DATABASE_URL in apps/api/.env

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: canquest
      POSTGRES_PASSWORD: canquest_dev
      POSTGRES_DB: canquest_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
