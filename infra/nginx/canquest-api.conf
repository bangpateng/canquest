# /etc/nginx/sites-available/canquest-api
# VPS 2 (62.171.185.56) — serves api.canquest.cc only.
# Next.js web is on Vercel; this machine only runs NestJS + DB + Redis.
#
# After DNS: api.canquest.cc A → 62.171.185.56
# Enable:
#   ln -s /etc/nginx/sites-available/canquest-api /etc/nginx/sites-enabled/canquest-api
# SSL:
#   certbot --nginx -d api.canquest.cc

server {
    listen 80;
    server_name api.canquest.cc 62.171.185.56;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip for API responses
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 512;

    # Max upload size for quest assets
    client_max_body_size 20M;

    # All traffic → NestJS on port 3001
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming support (for future real-time features)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # Health check endpoint (no auth, no rate limit)
    location /api/health {
        proxy_pass http://127.0.0.1:3001;
        access_log off;
    }
}
