# /etc/nginx/sites-available/canquest
# Symlink: ln -s /etc/nginx/sites-available/canquest /etc/nginx/sites-enabled/canquest
#
# Full stack on VPS 2: web :3000 + API :3001 (62.171.185.56).
# Replace yourdomain.com with canquest.cc or keep the IP for testing.
# For HTTPS: run `certbot --nginx -d yourdomain.com` after this is in place.

server {
    listen 80;
    server_name yourdomain.com 62.171.185.56;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # NestJS API — all /api/* requests go to port 3001
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Next.js Web — everything else goes to port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Static Next.js assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Quest media uploads
    location /quest-media/ {
        alias /var/www/canquest/apps/web/public/quest-media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
