sdk-version: 3.4.11
# ============================================================
# CanQuest DAML Package — canquest-v21 (lean)
# Version: 2.0.0
# SDK: 3.4.11 (Canton Network)
#
# Model lean (3 template) — lihat CHANGELOG di Main.daml.
#
# Templates (module Main):
#   1. WalletRegistration — jangkar identitas on-chain (admin sign, user observer)
#   2. QuestCampaign      — mesin klaim anti-sybil (FCFS / Raffle + state machine)
#   3. QuestClaim         — receipt klaim: AtomicFeeAndReward + RevealRewardCode
#
# YANG TIDAK ADA DI ON-CHAIN (sengaja, off-chain di Postgres):
#   - Poin user (earnedPoints/spentPoints)  → backend DB
#   - Daily check-in (gate 24h)             → backend DB (QuestSubmission unik)
#   - Referral reward                       → backend DB
#   - Audit trail CC (CcTransactionLog)     → redundan, ledger Canton sudah audit
#   - Spin (feature removed)                → tabel di-drop
#
# CC/Amulet ASLI bergerak di Canton Token Standard (CIP-56 TransferFactory)
# di luar DAML, di-orkestrasi backend. DAML Main hanya receipt + anti-sybil.
#
# Authorization pattern (Canton M3):
#   signatory admin  — operator menandatangani semua kontrak
#   observer user    — user hanya lihat, tidak bisa submit sendiri
#
# Docs: https://docs.canton.network/appdev/modules/m3-dev-environment
# ============================================================
name: canquest-v21
source: daml
version: 2.0.0
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
