sdk-version: 3.4.11
# ============================================================
# CanQuest DAML Package — canquest-v4
# Version: 1.0.3
# SDK: 3.4.11 (Canton Network)
#
# Templates (module Main):
#   1. UserAccount        — akun user on-chain (poin earned & spent)
#   2. WalletRegistration — bukti pembuatan wallet/party ID
#   3. QuestCampaign      — template induk quest (semua 8 RewardType)
#   4. QuestClaim         — bukti klaim quest + fee + reward + reveal code
#   5. DailyCheckIn       — check-in harian on-chain
#   6. SpinExecution      — audit trail spin on-chain
#   7. SpinCcReward       — bukti CC reward dari spin
#   8. ReferralReward     — bukti referral reward dikreditkan
#   9. CcTransactionLog   — audit trail setiap CC credit/debit event
#
# Authorization pattern (Canton M3):
#   signatory admin  — operator yang menandatangani semua kontrak
#   observer user    — user hanya bisa melihat, tidak bisa submit sendiri
#
# Docs: https://docs.canton.network/appdev/modules/m3-dev-environment
# ============================================================
name: canquest-v11
source: daml
version: 1.0.2
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
